# Banco de dados (já existia)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
 
# JPA (já existia)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
 
# ✅ NOVO: Chave do admin via variável de ambiente
# No Render: adicione ADMIN_KEY = uma-senha-forte-aqui
# Para rodar local: crie um arquivo .env ou passe pela IDE
admin.key=${ADMIN_KEY:arthur123}
#              ↑ fallback local  ↑ variável do Render em produção

# Configuração de upload (opcional)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB